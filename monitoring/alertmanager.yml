groups:
  - name: infrawatch
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 5%"

      - alert: PodCountLow
        expr: kube_deployment_status_replicas_available{deployment="infrawatch-app"} < 2
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Available pods < 2"
