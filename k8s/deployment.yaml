apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrawatch-app
  namespace: infrawatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infrawatch-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: infrawatch-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: infrawatch-app
          image: infrawatch-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 3
          envFrom:
            - configMapRef:
                name: infrawatch-config
            - secretRef:
                name: infrawatch-secret
